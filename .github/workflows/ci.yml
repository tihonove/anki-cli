name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

# The e2e job drives a single shared AnkiWeb account, so no two CI runs may
# touch it at once. Serialize whole runs; queue rather than cancel, so a run is
# never killed mid-sync (which could leave the account half-updated).
concurrency:
  group: anki-cli-ci
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: anki-cli-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: anki-cli-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # The anki rslib dependency is a pinned git dependency in Cargo.toml, so cargo
      # fetches its source (and i18n submodules) itself — no manual checkout needed.

      - uses: dtolnay/rust-toolchain@stable

      - uses: arduino/setup-protoc@v3
        with:
          version: "29.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # .cargo/config.toml points PROTOC at a local dev path (force = false),
      # so an explicit env var here takes precedence.
      - name: Point PROTOC at the installed binary
        shell: bash
        run: echo "PROTOC=$(which protoc)" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      # Publish the executable raw (unpacked), named for the OS/arch so install.sh
      # can fetch it directly.
      - name: Stage raw binary
        shell: bash
        run: cp target/release/anki-cli "${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  # End-to-end tests against a real AnkiWeb account: build the binary and drive
  # it across two data directories (device A pushes, device B pulls) on each OS.
  e2e:
    needs: build
    strategy:
      fail-fast: false
      # One OS at a time: all matrix legs share the same AnkiWeb account.
      max-parallel: 1
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      ANKI_TEST_USERNAME: ${{ secrets.ANKI_TEST_USERNAME }}
      ANKI_TEST_PASSWORD: ${{ secrets.ANKI_TEST_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: arduino/setup-protoc@v3
        with:
          version: "29.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # .cargo/config.toml points PROTOC at a local dev path (force = false),
      # so an explicit env var here takes precedence. `which` works in Git Bash
      # on the Windows runner too.
      - name: Point PROTOC at the installed binary
        shell: bash
        run: echo "PROTOC=$(which protoc)" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2

      # Single test, single thread: the shared account is only ever touched once
      # at a time. Without ANKI_TEST_* creds this test self-skips.
      - name: E2E against AnkiWeb
        run: cargo test --locked --test e2e_ankiweb -- --nocapture --test-threads=1

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # merge-multiple flattens every artifact into the working directory, so the
      # raw binaries land side by side.
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List assets
        run: ls -la anki-cli-*

      - uses: softprops/action-gh-release@v2
        with:
          files: anki-cli-*
          generate_release_notes: true

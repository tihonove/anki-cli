name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  # Anki source tree the rslib path dependency points at (../anki-src).
  # Bump deliberately; rslib internals are used directly, so update + retest.
  ANKI_COMMIT: f13c15aef0c94f73f6101a030f1b69772f7f3e8c
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch pinned Anki source (rslib dependency)
        run: |
          git init ../anki-src
          git -C ../anki-src remote add origin https://github.com/ankitects/anki.git
          git -C ../anki-src fetch --depth 1 origin "$ANKI_COMMIT"
          git -C ../anki-src checkout FETCH_HEAD
          # rslib's i18n build expects the translation submodules; empty dirs
          # give an english-only build.
          mkdir -p ../anki-src/ftl/core-repo/core ../anki-src/ftl/qt-repo/desktop

      - uses: dtolnay/rust-toolchain@stable

      - uses: arduino/setup-protoc@v3
        with:
          version: "29.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # .cargo/config.toml points PROTOC at a local dev path (force = false),
      # so an explicit env var here takes precedence.
      - name: Point PROTOC at the installed binary
        shell: bash
        run: echo "PROTOC=$(which protoc)" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      - uses: actions/upload-artifact@v4
        with:
          name: anki-cli-${{ matrix.target }}
          path: target/release/anki-cli

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Package artifacts
        run: |
          for dir in anki-cli-*/; do
            target="${dir%/}"
            chmod +x "$dir/anki-cli"
            tar -C "$dir" -czf "$target.tar.gz" anki-cli
          done
          ls -la *.tar.gz

      - uses: softprops/action-gh-release@v2
        with:
          files: anki-cli-*.tar.gz
          generate_release_notes: true

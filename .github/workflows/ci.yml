name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: anki-cli-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: anki-cli-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # The anki rslib dependency is a pinned git dependency in Cargo.toml, so cargo
      # fetches its source (and i18n submodules) itself — no manual checkout needed.

      - uses: dtolnay/rust-toolchain@stable

      - uses: arduino/setup-protoc@v3
        with:
          version: "29.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # .cargo/config.toml points PROTOC at a local dev path (force = false),
      # so an explicit env var here takes precedence.
      - name: Point PROTOC at the installed binary
        shell: bash
        run: echo "PROTOC=$(which protoc)" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      # Publish the executable raw (unpacked), named for the OS/arch so install.sh
      # can fetch it directly.
      - name: Stage raw binary
        shell: bash
        run: cp target/release/anki-cli "${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # merge-multiple flattens every artifact into the working directory, so the
      # raw binaries land side by side.
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List assets
        run: ls -la anki-cli-*

      - uses: softprops/action-gh-release@v2
        with:
          files: anki-cli-*
          generate_release_notes: true
